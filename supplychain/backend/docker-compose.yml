version: '3.8'

services:
  backend:
    build: 
      context: ./functions
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - CHROMA_URL=http://chroma:8000
      # Pass through external API keys (make sure these are set in your local shell)
      - GOOGLE_GENAI_API_KEY=${GOOGLE_GENAI_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-true}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-adaptive-supply-chain}
    depends_on:
      - chroma

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  chroma_data:
