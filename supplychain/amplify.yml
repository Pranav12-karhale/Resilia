version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - flutter clean
            - flutter pub get
        build:
          commands:
            - flutter build web --release
      artifacts:
        baseDirectory: build/web
        files:
          - '**/*'
      cache:
        paths:
          - .pub-cache/**
    appRoot: flutter_app
